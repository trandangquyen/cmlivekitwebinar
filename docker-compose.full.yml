services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: classroom
      POSTGRES_USER: classroom
      POSTGRES_PASSWORD: classroom_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U classroom -d classroom']
      interval: 10s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 12

  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:v1.10.1}
    command:
      [
        '--config',
        '/etc/livekit.yaml',
        '--node-ip',
        '${LIVEKIT_NODE_IP:-127.0.0.1}',
      ]
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    volumes:
      - ./infra/livekit/livekit.full.yaml:/etc/livekit.yaml:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:7880/ || exit 1']
      interval: 10s
      timeout: 3s
      retries: 12

  egress:
    image: ${LIVEKIT_EGRESS_IMAGE:-livekit/egress:v1.12.0}
    depends_on:
      redis:
        condition: service_healthy
      livekit:
        condition: service_started
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./infra/livekit/egress.full.yaml:/etc/egress.yaml:ro
      - ./recordings:/out/recordings

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      livekit:
        condition: service_started
    environment:
      APP_ENV: local
      STRICT_CONFIG: 'false'
      API_PORT: 4300
      FRONTEND_ORIGIN: http://localhost:8080
      PUBLIC_API_BASE_URL: http://localhost:4300
      DATA_STORE: postgres
      DATABASE_URL: postgresql://classroom:classroom_dev@postgres:5432/classroom
      DB_AUTO_MIGRATE: 'true'
      LIVEKIT_WS_URL: ws://localhost:7880
      LIVEKIT_HTTP_URL: http://livekit:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      CLASSROOM_DEFAULT_WAITING_ROOM: 'true'
      RECORDING_OUTPUT_MODE: local
      RECORDING_LOCAL_PREFIX: /out/recordings
    ports:
      - '4300:4300'
    volumes:
      - ./recordings:/out/recordings

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4300
    depends_on:
      - api
    ports:
      - '8080:80'

volumes:
  postgres-data:
  redis-data:
