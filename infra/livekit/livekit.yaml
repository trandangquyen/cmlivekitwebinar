port: 7880
bind_addresses:
  - ""

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: false

redis:
  address: redis:6379

keys:
  devkey: secret

logging:
  level: info

room:
  auto_create: true
  empty_timeout: 300
  departure_timeout: 20

webhook:
  api_key: devkey
  urls:
    - http://host.docker.internal:4300/api/livekit/webhook
