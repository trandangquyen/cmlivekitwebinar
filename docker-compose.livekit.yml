services:
  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data

  livekit:
    image: ${LIVEKIT_IMAGE:-livekit/livekit-server:v1.10.1}
    command: ['--config', '/etc/livekit.yaml']
    depends_on:
      - redis
    ports:
      - '7880:7880'
      - '7881:7881'
      - '50000-50100:50000-50100/udp'
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro

  egress:
    image: ${LIVEKIT_EGRESS_IMAGE:-livekit/egress:v1.12.0}
    depends_on:
      - redis
      - livekit
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_FILE: /etc/egress.yaml
    volumes:
      - ./infra/livekit/egress.yaml:/etc/egress.yaml:ro
      - ./recordings:/out/recordings

volumes:
  redis-data:
